<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Formas de criar objetos </title>
</head>
<body>
    

    <script>
        //FORMA 1
        var aluno1 = new Object(); //cria um objeto sem propriedades nem metodos
        //usando Object
        aluno1.ra = "00001234";
        aluno1.nome = "João";
        alert(`ra=${aluno1.ra} nome=${aluno1.nome}`); //interpolação de string, saber disso pra prova

        //FORMA 2
        var aluno2 = {} //usando {}, cria sem propriedades ou metodos
        aluno2.ra = "1234";
        aluno2["nome"] = "Luís";
        alert("ra= " + aluno2.ra + " nome = " + aluno2.nome);
        aluno2["email do aluno"] = "gabriel@gmail.com";
        alert(aluno2["email do aluno"]); //se tiver com colchetes, invalido como nome de propriedade, precisa usar colchetes

        //FORMA 3 - LITERAL
        var aluno3 = { //literal
            ra: "1234567",
            nome: "José", // vírgula opcional
        };
        alert("ra = " + aluno3.ra + " nome = " + aluno3.nome);

        //FORMA 4 - USANDO FUNÇÃO CONSTRUTORA (criada antes das classes)
        //this significa público
        function Aluno(ra, nome){
            this.ra = ra; //unico jeito de enxergar fora da função, o this seria da pagina, this seria a msm coisa que colocar public
            this.nome = nome;
            this.MostraDados = function() {
                return "ra = " + this.ra + " nome =  "+this.nome;
            }
        }
        var aluno4 = new Aluno("123", "Lucas");
        alert(aluno4.MostraDados());
        alert(aluno4.nome);

        //FORMA 5 - FUNÇÃO CONSTRUTORA SEM PARÂMETROS
        //sem classes, para herança, você usa o prototype
        function Aluno2(){
            var ra; // encapsulado, escondido
            var nome;
            this.setRa = function(value){
                this.ra = value;
            }
            this.getRa = function(){
                return this.ra;
            }
            this.setNome = function(value){
                this.nome = value;
            }
            this.getNome = function(){
                return this.nome;
            }
        }
        var aluno6 = new Aluno2();
        aluno6.setNome("Pedro"); // sempre que for função e não propriedade, precisa de parenteses
        aluno6.setRa("234");
        alert("ra = "+ aluno6.getRa() + " nome = " + aluno6.getNome());

        //FORMA 6 - HERANÇA (sem classes?)
        function AlunoADS(){
            var numLab;
            this.setNumLab = function(value){
                this.numLab = value;
            }
            this.getNumLab = function(){
                return this.numLab;
            }
        }
        //herança
        AlunoADS.prototype = new Aluno2(); //está dizendo que aluno ads é a classe filho do aluno2
        var aluno7 = new AlunoADS();
        aluno7.setNome("Murilo");
        aluno7.setRa("123");
        aluno7.setNumLab(5);
        alert(aluno7.getNome() + " " + aluno7.getNumLab());

        //FORMA 7 - USANDO CLASSES
        class Aluno1{
            constructor(){ //no construtor está criando os atributos
                this._ra; //com classe precisa usar o _
                this._nome;
            }
            setNome(value){
                this._nome = value;
            }
            getNome(){
                return this._nome;
            }
            setRa(value){
                this._ra = value;
            }
            getRa(){
                return this._ra;
            }
            
        }
        var objAluno = new Aluno1();
        objAluno.setNome("Daniel");
        objAluno.setRa('123');
        alert(`nome = ${objAluno.getNome()} ra = ${objAluno.getRa()} `);
        //herança
        class AlunoADS1 extends Aluno1{
            constructor(){
                //super chama o construtor da classe pai
                super();
                this._numLab;
            }
            setNumLab(value){
                this._numLab = value;
            }
            getNumLab(){
                return this._numLab;
            }
        }
        var objAlunoADS = new AlunoADS1();
        objAlunoADS.setNome("Richard");
        objAlunoADS.setRa("123");
        objAlunoADS.setNumLab(6);
        alert(`nome = ${objAlunoADS.getNome()}  ra = ${objAlunoADS.getRa()}  numLab = ${objAlunoADS.getNumLab()}`);
        
        
        //OUTROS
        //COPIA DE OBJETOS
        var obj1 = new Object();
        var obj2 = obj1;
        obj1.nome = "Camila";
        alert(obj2.nome);
        //metodos e atributos - públicos e privados
        class ContaBancaria {
            #cpf; // atributo privado

            constructor(nome, saldoInicial){
                this.nome = nome; //atributo publico
                this.saldo = saldoInicial;
            }

            setCpf(value){
                this.#cpf = value;   
            }

            getCpf(){
                return this.#cpf;    
            }
            getSaldo(){
                return this.saldo;
            }
            // metodo publico
            depositar(valor){
                this.saldo += valor;
                this.#registrarTransacao(valor);
                //utilizando modificador # para métodos privado, usar o msm de private
            }
            //metodo privado
            #registrarTransacao(valor){
                console.log(`Depósito de R$ ${valor} realizado pelo ${this.nome} 
                e o Saldo R$ ${this.saldo} para cpf ${this.getCpf()} ou ${this.#cpf}`);
            }
        }
        const conta = new ContaBancaria("Gustavo", 1000);
        conta.setCpf(123);
        conta.depositar(500);
        // ver no console se aparece
    </script>
</body>
</html>
